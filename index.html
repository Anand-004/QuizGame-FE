<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="window " id="start-quiz">
            <h1>Quiz Game</h1>
            <p>Test your knowledge with this Quiz !</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div class="window" id="quiz-quiz">
            <div class="quiz-header">
                <div class="quiz-info">
                    <p>Question <span id="currentQuestion">1</span> of <span id="totalQuestion">5</span></p>
                    <p>Score : <span id="score">0</span></p>
                </div>
                <div id="question" class="question"><h2>Questions ?</h2></div>
            </div>
            <div class="quiz-questions" id="quiz-questions">

            </div>
            <div class="progressbar" id="progressbar">

            </div>
        </div>
        <div class="window active" id="quiz-result">
          <h1>Quiz Result !</h1>
          <div class="result-box">
            <p>You Scored <span id="score">5</span> out of <span id="totalQuestion">5</span></p>
            <h2 id="result-msg">Good Score</h2>
          </div>  
          <button id="restart">Restart Quiz</button>
        </div>
    </div>
    
</body>
</html>
